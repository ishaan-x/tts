
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenRouter AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <style>
        :root {
            --color-bg: 255, 255, 255;
            --color-text: 17, 24, 39;
            --color-primary: 59, 130, 246;
        }
        .dark {
            --color-bg: 31, 41, 55;
            --color-text: 226, 232, 240;
        }
        body {
            background-color: rgb(var(--color-bg));
            color: rgb(var(--color-text));
            min-height: 100dvh;
        }
        .markdown-body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        pre code.hljs {
            display: block;
            overflow-x: auto;
            padding: 1em;
            background: #2d3748;
            border-radius: 0.375rem;
        }
        #chat-container {
            max-height: calc(100dvh - 12rem);
            overflow-y: auto;
            scrollbar-gutter: stable;
        }
    </style>
</head>
<body class="antialiased">
    <div class="max-w-3xl mx-auto p-4">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold">OpenRouter AI Chat</h1>
            <div class="flex items-center gap-2">
                <button id="theme-toggle" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg id="theme-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </button>
                <button id="settings-toggle" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.754 2.924-1.754 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.754.426 1.754 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.754-2.924 1.754-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.754-.426-1.754-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>
        </header>

        <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
            <div class="bg-white dark:bg-gray-800 rounded-lg mx-4 mt-20 p-6 max-w-md mx-auto">
                <h2 class="text-lg font-semibold mb-4">Settings</h2>
                <div class="space-y-4">
                    <div>
                        <label for="api-key" class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                        <input type="password" id="api-key" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600">
                    </div>
                    <div>
                        <label for="system-prompt" class="block text-sm font-medium mb-1">System Prompt</label>
                        <textarea id="system-prompt" rows="3" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600"></textarea>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="refresh-models" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 flex-1">Refresh Models</button>
                        <button id="clear-history" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 flex-1">Clear History</button>
                    </div>
                    <button id="close-settings" class="w-full mt-2 py-2 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600">Close</button>
                </div>
            </div>
        </div>

        <div id="chat-container" class="space-y-4 mb-4 markdown-body"></div>

        <div class="flex gap-2">
            <select id="model-selector" class="flex-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600">
                <option value="">Loading models...</option>
            </select>
            <button id="stop-generation" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 hidden">Stop</button>
        </div>

        <div class="mt-2 flex gap-2">
            <textarea id="user-input" rows="1" class="flex-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600 resize-none" placeholder="Type your message..."></textarea>
            <button id="send-button" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">Send</button>
        </div>
    </div>

    <script>
        // Initialize marked and highlight.js
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            langPrefix: 'hljs language-', // highlight.js css expects a top-level 'hljs' class
        });

        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const modelSelector = document.getElementById('model-selector');
        const stopButton = document.getElementById('stop-generation');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const settingsToggle = document.getElementById('settings-toggle');
        const settingsModal = document.getElementById('settings-modal');
        const closeSettings = document.getElementById('close-settings');
        const apiKeyInput = document.getElementById('api-key');
        const systemPromptInput = document.getElementById('system-prompt');
        const refreshModelsButton = document.getElementById('refresh-models');
        const clearHistoryButton = document.getElementById('clear-history');

        // State
        let currentController = null;
        let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];
        let apiKey = localStorage.getItem('apiKey') || '';
        let selectedModel = localStorage.getItem('selectedModel') || '';
        let systemPrompt = localStorage.getItem('systemPrompt') || 'You are a helpful assistant.';
        let isDarkMode = localStorage.getItem('darkMode') === 'true' ||
                         (window.matchMedia('(prefers-color-scheme: dark)').matches && localStorage.getItem('darkMode') === null);

        // Apply theme
        if (isDarkMode) {
            document.documentElement.classList.add('dark');
        }

        // Update UI from state
        apiKeyInput.value = apiKey;
        systemPromptInput.value = systemPrompt;
        if (selectedModel) {
            modelSelector.value = selectedModel;
        }

        // Render chat history
        function renderChatHistory() {
            chatContainer.innerHTML = '';
            chatHistory.forEach(message => {
                const messageElement = document.createElement('div');
                messageElement.className = `p-4 rounded-lg ${message.role === 'user' ? 'bg-blue-100 dark:bg-blue-900 ml-auto' : 'bg-gray-100 dark:bg-gray-700 mr-auto'}`;
                messageElement.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="font-semibold">${message.role === 'user' ? 'You' : 'AI'}</span>
                        ${message.role === 'assistant' && message.model ?
                            `<span class="text-xs bg-gray-200 dark:bg-gray-600 px-2 py-1 rounded cursor-pointer hover:bg-gray-300 dark:hover:bg-gray-500"
                                  data-model="${message.model}"
                                  title="Click to use this model again">
                                🤖 ${message.model}
                            </span>` : ''}
                    </div>
                    <div class="mt-2 markdown-body">${marked.parse(message.content)}</div>
                `;
                chatContainer.appendChild(messageElement);

                // Add click handler for model badges
                if (message.role === 'assistant' && message.model) {
                    const badge = messageElement.querySelector(`[data-model="${message.model}"]`);
                    badge.addEventListener('click', () => {
                        modelSelector.value = message.model;
                        selectedModel = message.model;
                        localStorage.setItem('selectedModel', selectedModel);
                    });
                }
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Fetch free models from OpenRouter
        async function fetchFreeModels() {
            try {
                const response = await fetch('https://openrouter.ai/api/v1/models', {
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });
                if (!response.ok) throw new Error('Failed to fetch models');
                const data = await response.json();
                const freeModels = data.data.filter(model =>
                    model.pricing?.prompt === 0 && model.pricing?.completion === 0
                ).sort((a, b) => a.id.localeCompare(b.id));

                modelSelector.innerHTML = '';
                freeModels.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.name || model.id;
                    modelSelector.appendChild(option);
                });

                if (freeModels.length > 0 && !selectedModel) {
                    selectedModel = freeModels[0].id;
                    modelSelector.value = selectedModel;
                    localStorage.setItem('selectedModel', selectedModel);
                }
            } catch (error) {
                console.error('Error fetching models:', error);
                // Fallback to known free models
                const fallbackModels = [
                    'openrouter/free',
                    'meta-llama/llama-3.3-70b-instruct:nitro',
                    'mistralai/mistral-7b-instruct:nitro',
                    'google/gemma-7b-it:nitro',
                    'qwen/qwen2-72b-instruct:nitro'
                ];

                modelSelector.innerHTML = '';
                fallbackModels.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model;
                    option.textContent = model.split('/').pop().split(':')[0];
                    modelSelector.appendChild(option);
                });

                if (fallbackModels.length > 0 && !selectedModel) {
                    selectedModel = fallbackModels[0];
                    modelSelector.value = selectedModel;
                    localStorage.setItem('selectedModel', selectedModel);
                }
            }
        }

        // Send message to OpenRouter API
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || !apiKey) return;

            // Add user message to chat
            chatHistory.push({ role: 'user', content: message });
            renderChatHistory();
            userInput.value = '';
            userInput.rows = 1;

            // Add empty assistant message as placeholder
            const assistantMessageIndex = chatHistory.length;
            chatHistory.push({ role: 'assistant', content: '', model: selectedModel });
            renderChatHistory();

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.origin,
                        'X-Title': 'GitHub Page AI Chat'
                    },
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            ...chatHistory.slice(0, -1).map(msg => ({ role: msg.role, content: msg.content }))
                        ],
                        stream: true
                    }),
                    signal: new AbortController().signal
                });

                if (!response.ok) throw new Error(`API error: ${response.status}`);
                if (!response.body) throw new Error('No response body');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let result = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const data = line.substring(5).trim();
                            if (data === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(data);
                                const content = parsed.choices[0]?.delta?.content;
                                if (content) {
                                    result += content;
                                    chatHistory[assistantMessageIndex].content = result;
                                    renderChatHistory();
                                }
                            } catch (e) {
                                console.error('Error parsing SSE:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                chatHistory[assistantMessageIndex].content = `⚠️ Error: ${error.message}`;
                renderChatHistory();
            }
        }

        // Event Listeners
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-grow textarea
        userInput.addEventListener('input', () => {
            userInput.rows = 1;
            const scrollHeight = userInput.scrollHeight;
            const rows = Math.min(Math.floor((scrollHeight - 34) / 20) + 1, 4);
            userInput.rows = rows;
        });

        // Theme toggle
        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                themeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                `;
            } else {
                document.documentElement.classList.remove('dark');
                themeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                `;
            }
            localStorage.setItem('darkMode', isDarkMode);
        });

        // Settings modal
        settingsToggle.addEventListener('click', () => settingsModal.classList.remove('hidden'));
        closeSettings.addEventListener('click', () => settingsModal.classList.add('hidden'));

        // Save API key
        apiKeyInput.addEventListener('change', () => {
            apiKey = apiKeyInput.value;
            localStorage.setItem('apiKey', apiKey);
        });

        // Save system prompt
        systemPromptInput.addEventListener('change', () => {
            systemPrompt = systemPromptInput.value;
            localStorage.setItem('systemPrompt', systemPrompt);
        });

        // Refresh models
        refreshModelsButton.addEventListener('click', fetchFreeModels);

        // Clear history
        clearHistoryButton.addEventListener('click', () => {
            if (confirm('Are you sure you want to clear your chat history?')) {
                chatHistory = [];
                localStorage.removeItem('chatHistory');
                renderChatHistory();
            }
        });

        // Model selector change
        modelSelector.addEventListener('change', () => {
            selectedModel = modelSelector.value;
            localStorage.setItem('selectedModel', selectedModel);
        });

        // Initialize
        fetchFreeModels();
        renderChatHistory();
    </script>
</body>
</html>
