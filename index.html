<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenRouter AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
    <style>
        :root {
            --color-bg: 248, 250, 252;
            --color-bg-2: 241, 245, 249;
            --color-text: 15, 23, 42;
            --color-text-muted: 100, 116, 139;
            --color-primary: 59, 130, 246;
            --color-primary-hover: 37, 99, 235;
            --color-input-bg: 255, 255, 255;
            --color-input-border: 226, 232, 240;
            --color-shadow: 0, 0, 0;
        }
        .dark {
            --color-bg: 2, 6, 23;
            --color-bg-2: 15, 23, 42;
            --color-text: 248, 250, 252;
            --color-text-muted: 148, 163, 184;
            --color-primary: 96, 165, 250;
            --color-primary-hover: 59, 130, 246;
            --color-input-bg: 30, 41, 59;
            --color-input-border: 71, 85, 105;
            --color-shadow: 255, 255, 255;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: rgb(var(--color-bg));
            color: rgb(var(--color-text));
            min-height: 100dvh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        header {
            padding: 1rem;
            border-bottom: 1px solid rgb(var(--color-input-border));
            backdrop-filter: blur(8px);
            background-color: rgba(var(--color-bg), 0.9);
            z-index: 10;
            flex-shrink: 0;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            scroll-behavior: smooth;
        }

        .input-wrapper {
            padding: 1rem;
            border-top: 1px solid rgb(var(--color-input-border));
            background-color: rgb(var(--color-bg));
            flex-shrink: 0;
        }

        .message-enter {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .markdown-body {
            line-height: 1.7;
            word-wrap: break-word;
        }

        .markdown-body p { margin-bottom: 0.8em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
            margin-top: 1em;
            margin-bottom: 0.5em;
            font-weight: 700;
            line-height: 1.3;
        }

        .markdown-body ul, .markdown-body ol {
            padding-left: 1.5em;
            margin-bottom: 0.8em;
        }

        .markdown-body pre {
            margin: 1em 0;
            border-radius: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .markdown-body code {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.9em;
            background-color: rgb(var(--color-bg-2));
            padding: 0.2em 0.4em;
            border-radius: 0.25rem;
        }

        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            display: block;
            overflow-x: auto;
        }

        .copy-code-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.25rem 0.5rem;
            background-color: rgba(var(--color-text), 0.1);
            border: 1px solid rgb(var(--color-input-border));
            border-radius: 0.25rem;
            color: rgb(var(--color-text-muted));
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.8;
            z-index: 2;
        }

        .copy-code-btn:hover {
            background-color: rgba(var(--color-primary), 0.2);
            color: rgb(var(--color-primary));
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: rgb(var(--color-primary));
            border-radius: 50%;
            display: inline-block;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        .typing-dot:nth-child(3) { animation-delay: 0s; }

        @keyframes typing {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }

        textarea {
            resize: none;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        textarea:focus {
            box-shadow: 0 0 0 3px rgba(var(--color-primary), 0.25);
            border-color: rgb(var(--color-primary));
            outline: none;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            background-color: transparent;
        }

        .btn-icon:hover:not(:disabled) {
            background-color: rgba(var(--color-primary), 0.1);
            color: rgb(var(--color-primary));
        }

        .btn-icon:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal-overlay {
            backdrop-filter: blur(4px);
            transition: opacity 0.3s ease;
        }

        .modal-content {
            transform: translateY(0);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .modal-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .model-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            background-color: rgba(var(--color-primary), 0.1);
            color: rgb(var(--color-primary));
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .model-badge:hover {
            background-color: rgba(var(--color-primary), 0.2);
        }

        .message-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.2rem 0.4rem;
            font-size: 0.7rem;
            background-color: transparent;
            color: rgb(var(--color-text-muted));
            border-radius: 0.25rem;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.7;
        }

        .message-action-btn:hover {
            opacity: 1;
            background-color: rgba(var(--color-text), 0.05);
        }

        @media (max-width: 768px) {
            .chat-area { padding: 0.75rem; }
            .input-wrapper { padding: 0.75rem; }
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgb(var(--color-text-muted)); opacity: 0.3; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgb(var(--color-text-muted)); opacity: 0.5; }
    </style>
</head>
<body class="antialiased">
    <div id="app-container">
        <header class="flex justify-between items-center gap-3">
            <div class="flex items-center gap-3 min-w-0">
                <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm shadow-md">
                    AI
                </div>
                <h1 class="text-lg font-semibold truncate">OpenRouter Chat</h1>
            </div>
            <div class="flex items-center gap-1 flex-shrink-0">
                <button id="btn-new-chat" class="btn-icon" title="New Chat">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                </button>
                <button id="btn-theme" class="btn-icon" title="Toggle theme">
                    <svg id="icon-theme" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                </button>
                <button id="btn-settings" class="btn-icon" title="Settings">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.754 2.924-1.754 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.754.426 1.754 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.754-2.924 1.754-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.754-.426-1.754-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>
        </header>

        <main id="chat-container" class="chat-area space-y-6"></main>

        <footer id="input-footer" class="input-wrapper">
            <div class="max-w-3xl mx-auto space-y-2">
                <div class="relative">
                    <textarea id="user-input" rows="1" placeholder="Message OpenRouter AI... (Shift+Enter for new line)"
                              class="w-full p-3 pr-20 bg-rgb(var(--color-input-bg)) border border-rgb(var(--color-input-border)) rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all min-h-[52px] max-h-[120px]"></textarea>
                    
                    <div class="absolute right-2 bottom-2 flex items-center gap-1">
                        <button id="btn-stop" class="btn-icon hidden text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30" title="Stop generating">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd" />
                            </svg>
                        </button>
                        <button id="btn-send" class="btn-icon bg-blue-600 text-white hover:bg-blue-700 rounded-lg p-1.5 shadow-sm" title="Send">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="flex justify-between items-center text-xs px-1">
                    <span class="text-rgb(var(--color-text-muted))">Free model: <code class="bg-rgb(var(--color-bg-2)) px-1 py-0.5 rounded text-blue-600 dark:text-blue-400">openrouter/free</code></span>
                    <a href="https://openrouter.ai/keys" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline">Get API Key →</a>
                </div>
            </div>
        </footer>
    </div>

    <!-- Settings Modal -->
    <div id="modal-settings" class="modal-overlay fixed inset-0 bg-black/40 z-50 hidden flex items-end sm:items-center justify-center" aria-hidden="true">
        <div class="modal-content w-full sm:max-w-md bg-rgb(var(--color-bg)) rounded-t-2xl sm:rounded-2xl shadow-xl p-6 max-h-[85dvh] overflow-y-auto">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-lg font-semibold">Settings</h2>
                <button id="btn-close-modal" class="btn-icon" aria-label="Close">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label for="api-key" class="block text-sm font-medium mb-1.5">API Key</label>
                    <div class="relative">
                        <input type="password" id="api-key" placeholder="sk-or-xxxxxxxxxxxxxxxxxxxxxxxx"
                               class="w-full p-3 bg-rgb(var(--color-input-bg)) border border-rgb(var(--color-input-border)) rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button id="btn-toggle-key" class="absolute right-3 top-1/2 -translate-y-1/2 btn-icon p-0.5">
                            <svg id="icon-eye" class="w-4 h-4 text-rgb(var(--color-text-muted))" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                    <p id="api-error" class="text-xs text-red-500 mt-1 hidden"></p>
                </div>

                <div>
                    <label for="system-prompt" class="block text-sm font-medium mb-1.5">System Prompt</label>
                    <textarea id="system-prompt" rows="4" class="w-full p-3 bg-rgb(var(--color-input-bg)) border border-rgb(var(--color-input-border)) rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    <div class="flex gap-2 mt-2">
                        <button id="tmpl-helpful" class="flex-1 px-2 py-1.5 bg-rgb(var(--color-bg-2)) border border-rgb(var(--color-input-border)) rounded-lg text-xs font-medium hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:border-blue-200 transition-colors">👨‍💻 Helpful</button>
                        <button id="tmpl-creative" class="flex-1 px-2 py-1.5 bg-rgb(var(--color-bg-2)) border border-rgb(var(--color-input-border)) rounded-lg text-xs font-medium hover:bg-purple-50 dark:hover:bg-purple-900/20 hover:border-purple-200 transition-colors">🎨 Creative</button>
                        <button id="tmpl-concise" class="flex-1 px-2 py-1.5 bg-rgb(var(--color-bg-2)) border border-rgb(var(--color-input-border)) rounded-lg text-xs font-medium hover:bg-green-50 dark:hover:bg-green-900/20 hover:border-green-200 transition-colors">🎯 Concise</button>
                    </div>
                </div>

                <div>
                    <label for="model-search" class="block text-sm font-medium mb-1.5">Select Model</label>
                    <div class="relative">
                        <input type="text" id="model-search" placeholder="Search free models..."
                               class="w-full p-2.5 pl-10 bg-rgb(var(--color-input-bg)) border border-rgb(var(--color-input-border)) rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <svg class="absolute left-3 top-3 w-4 h-4 text-rgb(var(--color-text-muted))" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <div id="model-list" class="mt-2 max-h-48 overflow-y-auto border rounded-lg border-rgb(var(--color-input-border)) bg-rgb(var(--color-input-bg))"></div>
                </div>

                <div class="flex gap-3 pt-3 border-t border-rgb(var(--color-input-border))">
                    <button id="btn-refresh-models" class="flex-1 py-2.5 bg-rgb(var(--color-bg-2)) border border-rgb(var(--color-input-border)) rounded-lg text-sm font-medium hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:border-blue-300 transition-colors">Refresh Models</button>
                    <button id="btn-clear-history" class="flex-1 py-2.5 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/40 transition-colors">Clear History</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Welcome Screen -->
    <div id="welcome-screen" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center pointer-events-none z-0">
        <div class="text-6xl mb-6 opacity-20">✨</div>
        <h2 class="text-2xl font-bold mb-3 opacity-40">How can I help today?</h2>
        <p class="text-rgb(var(--color-text-muted)) max-w-md opacity-50">Ask me anything, from coding to creative writing to quick answers.</p>
    </div>

    <script>
        // Configuration
        const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
        const DEFAULT_MODEL = 'openrouter/free';
        const FALLBACK_MODELS = [
            { id: 'openrouter/free', name: 'OpenRouter Free (Auto)' },
            { id: 'meta-llama/llama-3.3-70b-instruct:nitro', name: 'Llama 3.3 70B' },
            { id: 'mistralai/mistral-7b-instruct:nitro', name: 'Mistral 7B' },
            { id: 'google/gemma-7b-it:nitro', name: 'Gemma 7B' },
            { id: 'qwen/qwen2-72b-instruct:nitro', name: 'Qwen2 72B' }
        ];

        // State
        const state = {
            chatHistory: JSON.parse(localStorage.getItem('chatHistory')) || [],
            apiKey: localStorage.getItem('apiKey') || '',
            selectedModel: localStorage.getItem('selectedModel') || DEFAULT_MODEL,
            systemPrompt: localStorage.getItem('systemPrompt') || 'You are a helpful, knowledgeable, and friendly assistant. Provide clear, concise, and accurate information.',
            isDarkMode: localStorage.getItem('darkMode') === 'true',
            availableModels: [],
            isGenerating: false,
            abortController: null,
            lastFocusedElement: null,
            saveTimeout: null,
            modelsFetched: false
        };

        // DOM Elements
        const dom = {
            chatContainer: document.getElementById('chat-container'),
            userInput: document.getElementById('user-input'),
            btnSend: document.getElementById('btn-send'),
            btnStop: document.getElementById('btn-stop'),
            btnTheme: document.getElementById('btn-theme'),
            iconTheme: document.getElementById('icon-theme'),
            btnSettings: document.getElementById('btn-settings'),
            modalSettings: document.getElementById('modal-settings'),
            btnCloseModal: document.getElementById('btn-close-modal'),
            btnNewChat: document.getElementById('btn-new-chat'),
            apiKeyInput: document.getElementById('api-key'),
            apiKeyError: document.getElementById('api-error'),
            btnToggleKey: document.getElementById('btn-toggle-key'),
            iconEye: document.getElementById('icon-eye'),
            systemPromptInput: document.getElementById('system-prompt'),
            tmplHelpful: document.getElementById('tmpl-helpful'),
            tmplCreative: document.getElementById('tmpl-creative'),
            tmplConcise: document.getElementById('tmpl-concise'),
            modelSearch: document.getElementById('model-search'),
            modelList: document.getElementById('model-list'),
            btnRefreshModels: document.getElementById('btn-refresh-models'),
            btnClearHistory: document.getElementById('btn-clear-history'),
            welcomeScreen: document.getElementById('welcome-screen')
        };

        // Initialize Marked & Highlight
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            langPrefix: 'hljs language-',
            breaks: true,
            gfm: true
        });

        // Theme
        function applyTheme(dark) {
            state.isDarkMode = dark;
            document.documentElement.classList.toggle('dark', dark);
            dom.iconTheme.innerHTML = dark 
                ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />'
                : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />';
            localStorage.setItem('darkMode', dark);
        }

        // Render Chat
        function renderChatHistory() {
            dom.chatContainer.innerHTML = '';
            
            if (state.chatHistory.length === 0) {
                dom.welcomeScreen.style.display = 'flex';
                return;
            }
            dom.welcomeScreen.style.display = 'none';

            state.chatHistory.forEach((message, index) => {
                appendMessageToDOM(message, index === state.chatHistory.length - 1);
            });
            scrollToBottom();
        }

        function appendMessageToDOM(message, animate = true) {
            const isUser = message.role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} message-enter`;
            
            if (animate) wrapper.style.animation = 'none';
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] rounded-2xl px-4 py-3 ${isUser ? 'bg-blue-600 text-white rounded-br-sm' : 'bg-rgb(var(--color-bg-2)) rounded-bl-sm'}`;
            
            const content = document.createElement('div');
            content.className = 'markdown-body';
            const cleanHTML = DOMPurify.sanitize(marked.parse(message.content || ''));
            content.innerHTML = cleanHTML;

            // Highlight code blocks
            content.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));

            bubble.appendChild(content);
            
            if (!isUser) {
                const meta = document.createElement('div');
                meta.className = 'flex items-center gap-2 mt-2 pt-2 border-t border-rgb(var(--color-input-border))';
                
                if (message.model) {
                    const badge = document.createElement('button');
                    badge.className = 'model-badge';
                    badge.innerHTML = `<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0z"/><path fill-rule="evenodd" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" clip-rule="evenodd"/></svg> ${message.model.split('/').pop()}`;
                    badge.title = 'Use this model again';
                    badge.addEventListener('click', () => {
                        state.selectedModel = message.model;
                        localStorage.setItem('selectedModel', state.selectedModel);
                        showSettingsModal();
                        renderModelList(state.availableModels);
                    });
                    meta.appendChild(badge);
                }

                const copyBtn = document.createElement('button');
                copyBtn.className = 'message-action-btn';
                copyBtn.innerHTML = '<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg> Copy';
                copyBtn.addEventListener('click', async () => {
                    await navigator.clipboard.writeText(message.content);
                    copyBtn.innerHTML = '<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied';
                    setTimeout(() => {
                        copyBtn.innerHTML = '<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg> Copy';
                    }, 1500);
                });
                meta.appendChild(copyBtn);
                
                bubble.appendChild(meta);
            }

            wrapper.appendChild(bubble);
            dom.chatContainer.appendChild(wrapper);
        }

        function updateLastMessage(content) {
            const lastBubble = dom.chatContainer.lastElementChild?.querySelector('.markdown-body');
            if (lastBubble) {
                lastBubble.innerHTML = DOMPurify.sanitize(marked.parse(content));
                lastBubble.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                scrollToBottom();
            }
        }

        function scrollToBottom() {
            dom.chatContainer.scrollTop = dom.chatContainer.scrollHeight;
        }

        // Debounced Save
        function debouncedSave() {
            clearTimeout(state.saveTimeout);
            state.saveTimeout = setTimeout(() => {
                localStorage.setItem('chatHistory', JSON.stringify(state.chatHistory));
            }, 500);
        }

        // Typing Indicator
        function showTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.id = 'typing-indicator';
            wrapper.className = 'flex justify-start message-enter';
            wrapper.innerHTML = `
                <div class="bg-rgb(var(--color-bg-2)) rounded-2xl rounded-bl-sm px-4 py-3 flex items-center gap-1.5">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
            `;
            dom.chatContainer.appendChild(wrapper);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        // Send Message
        async function sendMessage() {
            const message = dom.userInput.value.trim();
            if (!message || state.isGenerating) return;

            if (!state.apiKey) {
                showApiKeyError();
                return;
            }

            // Add user message
            state.chatHistory.push({ role: 'user', content: message });
            localStorage.setItem('chatHistory', JSON.stringify(state.chatHistory));
            dom.userInput.value = '';
            dom.userInput.style.height = 'auto';
            
            if (state.chatHistory.length === 1) dom.welcomeScreen.style.display = 'none';
            
            appendMessageToDOM(state.chatHistory[state.chatHistory.length - 1]);
            
            // Setup AI response placeholder
            state.chatHistory.push({ role: 'assistant', content: '', model: state.selectedModel });
            appendMessageToDOM(state.chatHistory[state.chatHistory.length - 1], false);
            
            state.isGenerating = true;
            dom.btnStop.classList.remove('hidden');
            dom.btnSend.disabled = true;
            
            state.abortController = new AbortController();
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.origin,
                        'X-Title': 'OpenRouter AI Chat'
                    },
                    body: JSON.stringify({
                        model: state.selectedModel,
                        messages: [
                            { role: 'system', content: state.systemPrompt },
                            ...state.chatHistory.slice(0, -1).map(m => ({ role: m.role, content: m.content }))
                        ],
                        stream: true
                    }),
                    signal: state.abortController.signal
                });

                if (!response.ok) {
                    throw new Error(response.status === 401 ? 'Invalid API key. Check Settings.' : 
                                   response.status === 429 ? 'Rate limit reached. Please wait ~1 minute.' :
                                   `API error (${response.status}). Try refreshing.`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let result = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    chunk.split('\n').filter(l => l.trim()).forEach(line => {
                        if (!line.startsWith('data:')) return;
                        const data = line.substring(5).trim();
                        if (data === '[DONE]') return;
                        
                        try {
                            const parsed = JSON.parse(data);
                            const content = parsed.choices?.[0]?.delta?.content;
                            if (content) {
                                result += content;
                                state.chatHistory[state.chatHistory.length - 1].content = result;
                                updateLastMessage(result);
                                debouncedSave();
                            }
                        } catch (e) {
                            console.error('Stream parse error:', e);
                        }
                    });
                }
            } catch (err) {
                if (err.name !== 'AbortError') {
                    state.chatHistory[state.chatHistory.length - 1].content = `⚠️ ${err.message}`;
                    updateLastMessage(`⚠️ ${err.message}`);
                    localStorage.setItem('chatHistory', JSON.stringify(state.chatHistory));
                } else {
                    state.chatHistory[state.chatHistory.length - 1].content = result || '⚠️ Generation stopped by user.';
                    updateLastMessage(state.chatHistory[state.chatHistory.length - 1].content);
                }
            } finally {
                state.isGenerating = false;
                state.abortController = null;
                dom.btnStop.classList.add('hidden');
                dom.btnSend.disabled = false;
                dom.userInput.focus();
            }
        }

        function showApiKeyError() {
            dom.apiKeyError.textContent = 'Please enter your OpenRouter API key in Settings ⚙️';
            dom.apiKeyError.classList.remove('hidden');
            setTimeout(() => dom.apiKeyError.classList.add('hidden'), 3000);
        }

        // Fetch Models
        async function fetchFreeModels() {
            state.modelSearch.placeholder = 'Loading...';
            try {
                const response = await fetch('https://openrouter.ai/api/v1/models', {
                    headers: { 'Authorization': `Bearer ${state.apiKey}` }
                });
                
                if (!response.ok) throw new Error('Failed');
                
                const data = await response.json();
                state.availableModels = data.data.filter(m => m.pricing?.prompt === 0 && m.pricing?.completion === 0)
                    .sort((a, b) => a.id.localeCompare(b.id))
                    .slice(0, 50); // Limit for UI
                    
                if (state.availableModels.length === 0) throw new Error('No free models found');
                
                state.modelsFetched = true;
            } catch (err) {
                console.warn('Using fallback models:', err.message);
                state.availableModels = FALLBACK_MODELS;
            } finally {
                renderModelList(state.availableModels);
                state.modelSearch.placeholder = 'Search models...';
                if (state.selectedModel && !state.availableModels.some(m => m.id === state.selectedModel)) {
                    state.selectedModel = DEFAULT_MODEL;
                    localStorage.setItem('selectedModel', DEFAULT_MODEL);
                }
            }
        }

        function renderModelList(models) {
            dom.modelList.innerHTML = '';
            models.forEach(model => {
                const item = document.createElement('div');
                item.className = `p-2.5 hover:bg-blue-50 dark:hover:bg-blue-900/20 cursor-pointer border-b border-rgb(var(--color-input-border)) last:border-b-0 text-sm ${state.selectedModel === model.id ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : ''}`;
                item.textContent = model.name || model.id;
                item.addEventListener('click', () => {
                    state.selectedModel = model.id;
                    localStorage.setItem('selectedModel', state.selectedModel);
                    renderModelList(models);
                });
                dom.modelList.appendChild(item);
            });
        }

        // Modal
        function showSettingsModal() {
            state.lastFocusedElement = document.activeElement;
            dom.modalSettings.classList.remove('hidden');
            dom.modalSettings.setAttribute('aria-hidden', 'false');
            dom.apiKeyInput.value = state.apiKey;
            dom.systemPromptInput.value = state.systemPrompt;
            dom.modelSearch.value = '';
            renderModelList(state.availableModels);
            setTimeout(() => dom.apiKeyInput.focus(), 100);
        }

        function hideSettingsModal() {
            dom.modalSettings.classList.add('hidden');
            dom.modalSettings.setAttribute('aria-hidden', 'true');
            if (state.lastFocusedElement) state.lastFocusedElement.focus();
        }

        // Event Listeners
        dom.btnSend.addEventListener('click', sendMessage);
        dom.userInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        dom.userInput.addEventListener('input', () => {
            dom.userInput.style.height = 'auto';
            dom.userInput.style.height = Math.min(dom.userInput.scrollHeight, 120) + 'px';
        });

        dom.btnTheme.addEventListener('click', () => applyTheme(!state.isDarkMode));
        
        dom.btnSettings.addEventListener('click', showSettingsModal);
        dom.btnCloseModal.addEventListener('click', hideSettingsModal);
        dom.modalSettings.addEventListener('click', e => {
            if (e.target === dom.modalSettings) hideSettingsModal();
        });

        dom.apiKeyInput.addEventListener('input', () => {
            const key = dom.apiKeyInput.value.trim();
            state.apiKey = key;
            localStorage.setItem('apiKey', key);
            dom.apiKeyError.classList.add('hidden');
            if (key && key.length > 10) {
                fetchFreeModels();
            }
        });

        dom.btnToggleKey.addEventListener('click', () => {
            dom.apiKeyInput.type = dom.apiKeyInput.type === 'password' ? 'text' : 'password';
        });

        dom.systemPromptInput.addEventListener('change', () => {
            state.systemPrompt = dom.systemPromptInput.value;
            localStorage.setItem('systemPrompt', state.systemPrompt);
        });

        [dom.tmplHelpful, dom.tmplCreative, dom.tmplConcise].forEach((btn, idx) => {
            btn.addEventListener('click', () => {
                const templates = [
                    'You are a helpful, knowledgeable, and friendly assistant. Provide clear, concise, and accurate information.',
                    'You are a creative and imaginative assistant. Think outside the box and provide unique, engaging responses.',
                    'You are a concise assistant. Provide short, direct answers without unnecessary detail.'
                ];
                dom.systemPromptInput.value = templates[idx];
                state.systemPrompt = templates[idx];
                localStorage.setItem('systemPrompt', state.systemPrompt);
            });
        });

        dom.modelSearch.addEventListener('input', () => {
            const term = dom.modelSearch.value.toLowerCase();
            renderModelList(state.availableModels.filter(m => 
                (m.name || m.id).toLowerCase().includes(term)
            ));
        });

        dom.btnRefreshModels.addEventListener('click', fetchFreeModels);

        dom.btnClearHistory.addEventListener('click', () => {
            if (confirm('Clear all chat history?')) {
                state.chatHistory = [];
                localStorage.removeItem('chatHistory');
                renderChatHistory();
                hideSettingsModal();
            }
        });

        dom.btnNewChat.addEventListener('click', () => {
            if (state.chatHistory.length > 0 && confirm('Start new chat?')) {
                state.chatHistory = [];
                localStorage.removeItem('chatHistory');
                renderChatHistory();
            }
        });

        dom.btnStop.addEventListener('click', () => {
            if (state.abortController) {
                state.abortController.abort();
            }
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') hideSettingsModal();
        });

        // Initialize
        applyTheme(state.isDarkMode || window.matchMedia('(prefers-color-scheme: dark)').matches);
        
        if (!state.isDarkMode && !localStorage.getItem('darkMode')) {
            applyTheme(false);
        }
        
        if (state.apiKey) fetchFreeModels();
        renderChatHistory();

        if (state.chatHistory.length === 0) {
            setTimeout(() => dom.userInput.focus(), 100);
        }
    </script>
</body>
</html>
