
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenRouter AI Chat (UX Upgrade)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <style>
        :root {
            --color-bg: 255, 255, 255;
            --color-text: 17, 24, 39;
            --color-primary: 59, 130, 246;
            --color-input-bg: 249, 250, 251;
            --color-input-bg-dark: 31, 41, 55;
            --color-input-border: 209, 213, 219;
            --color-input-border-dark: 75, 85, 99;
        }
        .dark {
            --color-bg: 15, 23, 42;
            --color-text: 226, 232, 240;
            --color-input-bg: 31, 41, 55;
            --color-input-border: 75, 85, 99;
        }
        body {
            background-color: rgb(var(--color-bg));
            color: rgb(var(--color-text));
            min-height: 100dvh;
            transition: background-color 0.3s, color 0.3s;
        }
        .markdown-body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
        }
        pre code.hljs {
            display: block;
            overflow-x: auto;
            padding: 1em;
            background: #2d3748;
            border-radius: 0.375rem;
        }
        #chat-container {
            max-height: calc(100dvh - 16rem);
            overflow-y: auto;
            scrollbar-gutter: stable;
            scroll-behavior: smooth;
        }
        .message-enter-active, .message-leave-active {
            transition: opacity 0.3s, transform 0.3s;
        }
        .message-enter-from, .message-leave-to {
            opacity: 0;
            transform: translateY(10px);
        }
        .message-enter-to, .message-leave-from {
            opacity: 1;
            transform: translateY(0);
        }
        .typing-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: rgb(var(--color-primary));
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-indicator:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-5px);
            }
        }
        @media (max-width: 768px) {
            #chat-container {
                max-height: calc(100dvh - 14rem);
            }
            #input-area {
                position: sticky;
                bottom: 1rem;
                background: rgb(var(--color-bg));
                padding-top: 0.5rem;
                margin-top: 0.5rem;
                border-radius: 0.5rem 0.5rem 0 0;
            }
        }
    </style>
</head>
<body class="antialiased">
    <div class="max-w-3xl mx-auto p-4">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold">OpenRouter AI Chat</h1>
            <div class="flex items-center gap-2">
                <button id="theme-toggle" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" aria-label="Toggle dark mode">
                    <svg id="theme-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </button>
                <button id="settings-toggle" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" aria-label="Open settings">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.754 2.924-1.754 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.754.426 1.754 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.754-2.924 1.754-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.754-.426-1.754-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>
        </header>

        <div id="chat-container" class="space-y-4 mb-4 markdown-body"></div>

        <div id="typing-indicator-container" class="flex justify-start mb-2 hidden">
            <div class="flex gap-1">
                <div class="typing-indicator"></div>
                <div class="typing-indicator"></div>
                <div class="typing-indicator"></div>
            </div>
        </div>

        <div id="model-selector-container" class="mb-2">
            <div class="relative">
                <select id="model-selector" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 pr-8 transition-colors bg-rgb(var(--color-input-bg)) border-rgb(var(--color-input-border)) text-rgb(var(--color-text))">
                    <option value="">Loading models...</option>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center pr-2 pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 01.707.293l3 3a1 1 0 01-1.414 1.414L10 5.414 7.707 7.707a1 1 0 01-1.414-1.414l3-3A1 1 0 0110 3zm-3.707 9.293a1 1 0 011.414 0L10 14.586l2.293-2.293a1 1 0 011.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>
        </div>

        <div id="input-area">
            <div class="flex gap-2 items-end">
                <div class="flex-1 relative">
                    <textarea id="user-input" rows="1" class="w-full p-3 pr-12 border rounded resize-none transition-colors bg-rgb(var(--color-input-bg)) border-rgb(var(--color-input-border)) text-rgb(var(--color-text)) focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                              placeholder="Type your message... (Shift+Enter for new line)"
                              aria-label="Type your message"></textarea>
                    <div class="absolute right-2 bottom-2 flex gap-1">
                        <button id="stop-generation" class="p-1 text-gray-500 hover:text-red-500 transition-colors hidden" aria-label="Stop generation">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
                            </svg>
                        </button>
                        <button id="send-button" class="p-1 text-blue-500 hover:text-blue-600 transition-colors" aria-label="Send message">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            <p class="text-xs text-gray-500 mt-1 dark:text-gray-400">
                Free tier: ~20 requests/min, 200/day. <a href="https://openrouter.ai/keys" target="_blank" class="text-blue-500 hover:underline">Get your API key</a>
            </p>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden" aria-hidden="true">
        <div class="bg-white dark:bg-gray-800 rounded-lg mx-4 mt-12 mb-4 p-6 max-w-md mx-auto max-h-[80dvh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold">Settings</h2>
                <button id="close-settings" class="p-1 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors" aria-label="Close settings">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label for="api-key" class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key" class="w-full p-2 border rounded transition-colors bg-rgb(var(--color-input-bg)) border-rgb(var(--color-input-border)) text-rgb(var(--color-text)) focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <p id="api-key-error" class="text-xs text-red-500 mt-1 hidden"></p>
                </div>
                <div>
                    <label for="system-prompt" class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="system-prompt" rows="4" class="w-full p-2 border rounded transition-colors bg-rgb(var(--color-input-bg)) border-rgb(var(--color-input-border)) text-rgb(var(--color-text)) focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                    <div class="flex gap-2 mt-1">
                        <button id="prompt-template-helpful" class="text-xs px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Helpful</button>
                        <button id="prompt-template-creative" class="text-xs px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Creative</button>
                        <button id="prompt-template-concise" class="text-xs px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Concise</button>
                    </div>
                </div>
                <div>
                    <label for="model-search" class="block text-sm font-medium mb-1">Search Models</label>
                    <input type="text" id="model-search" class="w-full p-2 border rounded transition-colors bg-rgb(var(--color-input-bg)) border-rgb(var(--color-input-border)) text-rgb(var(--color-text)) focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Search free models...">
                </div>
                <div class="max-h-64 overflow-y-auto border rounded p-2 bg-rgb(var(--color-input-bg))">
                    <div id="model-list" class="space-y-1"></div>
                </div>
                <div class="flex items-center gap-2 pt-2 border-t border-gray-200 dark:border-gray-700">
                    <button id="refresh-models" class="flex-1 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition-colors">Refresh Models</button>
                    <button id="clear-history" class="flex-1 px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition-colors">Clear History</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize marked and highlight.js
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            langPrefix: 'hljs language-',
        });

        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const modelSelector = document.getElementById('model-selector');
        const stopButton = document.getElementById('stop-generation');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const settingsToggle = document.getElementById('settings-toggle');
        const settingsModal = document.getElementById('settings-modal');
        const closeSettings = document.getElementById('close-settings');
        const apiKeyInput = document.getElementById('api-key');
        const apiKeyError = document.getElementById('api-key-error');
        const systemPromptInput = document.getElementById('system-prompt');
        const modelSearch = document.getElementById('model-search');
        const modelList = document.getElementById('model-list');
        const refreshModelsButton = document.getElementById('refresh-models');
        const clearHistoryButton = document.getElementById('clear-history');
        const typingIndicator = document.getElementById('typing-indicator-container');
        const promptTemplateHelpful = document.getElementById('prompt-template-helpful');
        const promptTemplateCreative = document.getElementById('prompt-template-creative');
        const promptTemplateConcise = document.getElementById('prompt-template-concise');

        // State
        let currentController = null;
        let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];
        let apiKey = localStorage.getItem('apiKey') || '';
        let selectedModel = localStorage.getItem('selectedModel') || '';
        let systemPrompt = localStorage.getItem('systemPrompt') || 'You are a helpful assistant.';
        let isDarkMode = localStorage.getItem('darkMode') === 'true' ||
                         (window.matchMedia('(prefers-color-scheme: dark)').matches && localStorage.getItem('darkMode') === null);
        let availableModels = [];

        // Apply theme
        if (isDarkMode) {
            document.documentElement.classList.add('dark');
            themeIcon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            `;
        } else {
            themeIcon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            `;
        }

        // Update UI from state
        apiKeyInput.value = apiKey;
        systemPromptInput.value = systemPrompt;
        if (selectedModel) {
            modelSelector.value = selectedModel;
        }

        // Render chat history with animations
        function renderChatHistory() {
            chatContainer.innerHTML = '';
            chatHistory.forEach((message, index) => {
                const messageElement = document.createElement('div');
                messageElement.className = `p-4 rounded-lg transition-all duration-300 message-enter-active
                    ${message.role === 'user' ? 'bg-blue-100 dark:bg-blue-900 ml-auto' : 'bg-gray-100 dark:bg-gray-700 mr-auto'}`;

                messageElement.style.opacity = '0';
                messageElement.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    messageElement.style.opacity = '1';
                    messageElement.style.transform = 'translateY(0)';
                }, 50 * index);

                messageElement.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="font-semibold">${message.role === 'user' ? 'You' : 'AI'}</span>
                        ${message.role === 'assistant' && message.model ?
                            `<span class="text-xs bg-gray-200 dark:bg-gray-600 px-2 py-1 rounded cursor-pointer hover:bg-gray-300 dark:hover:bg-gray-500 transition-colors"
                                  data-model="${message.model}"
                                  title="Click to use this model again">
                                🤖 ${message.model.split('/').pop().split(':')[0]}
                            </span>` : ''}
                    </div>
                    <div class="mt-2 markdown-body">${marked.parse(message.content)}</div>
                `;
                chatContainer.appendChild(messageElement);

                // Add click handler for model badges
                if (message.role === 'assistant' && message.model) {
                    const badge = messageElement.querySelector(`[data-model="${message.model}"]`);
                    badge.addEventListener('click', () => {
                        modelSelector.value = message.model;
                        selectedModel = message.model;
                        localStorage.setItem('selectedModel', selectedModel);
                    });
                }
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Fetch free models from OpenRouter
        async function fetchFreeModels() {
            try {
                typingIndicator.classList.remove('hidden');
                const response = await fetch('https://openrouter.ai/api/v1/models', {
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });
                if (!response.ok) throw new Error('Failed to fetch models');
                const data = await response.json();
                availableModels = data.data.filter(model =>
                    model.pricing?.prompt === 0 && model.pricing?.completion === 0
                ).sort((a, b) => a.id.localeCompare(b.id));

                // Update main selector
                modelSelector.innerHTML = '';
                availableModels.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.name || model.id;
                    modelSelector.appendChild(option);
                });

                // Update settings modal list
                renderModelList(availableModels);

                if (availableModels.length > 0 && !selectedModel) {
                    selectedModel = availableModels[0].id;
                    modelSelector.value = selectedModel;
                    localStorage.setItem('selectedModel', selectedModel);
                }
            } catch (error) {
                console.error('Error fetching models:', error);
                // Fallback to known free models
                availableModels = [
                    { id: 'openrouter/free', name: 'OpenRouter Free (Auto)' },
                    { id: 'meta-llama/llama-3.3-70b-instruct:nitro', name: 'Llama 3.3 70B' },
                    { id: 'mistralai/mistral-7b-instruct:nitro', name: 'Mistral 7B' },
                    { id: 'google/gemma-7b-it:nitro', name: 'Gemma 7B' },
                    { id: 'qwen/qwen2-72b-instruct:nitro', name: 'Qwen2 72B' }
                ];

                modelSelector.innerHTML = '';
                availableModels.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.name;
                    modelSelector.appendChild(option);
                });

                renderModelList(availableModels);

                if (availableModels.length > 0 && !selectedModel) {
                    selectedModel = availableModels[0].id;
                    modelSelector.value = selectedModel;
                    localStorage.setItem('selectedModel', selectedModel);
                }
            } finally {
                typingIndicator.classList.add('hidden');
            }
        }

        // Render model list in settings
        function renderModelList(models) {
            modelList.innerHTML = '';
            models.forEach(model => {
                const modelItem = document.createElement('div');
                modelItem.className = 'p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer transition-colors';
                modelItem.textContent = model.name || model.id;
                modelItem.addEventListener('click', () => {
                    modelSelector.value = model.id;
                    selectedModel = model.id;
                    localStorage.setItem('selectedModel', selectedModel);
                    settingsModal.classList.add('hidden');
                });
                modelList.appendChild(modelItem);
            });
        }

        // Search models in settings
        modelSearch.addEventListener('input', () => {
            const searchTerm = modelSearch.value.toLowerCase();
            const filteredModels = availableModels.filter(model =>
                (model.name || model.id).toLowerCase().includes(searchTerm)
            );
            renderModelList(filteredModels);
        });

        // Send message to OpenRouter API
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || !apiKey) {
                if (!apiKey) {
                    apiKeyError.textContent = 'Please enter your OpenRouter API key in settings';
                    apiKeyError.classList.remove('hidden');
                }
                return;
            }

            // Add user message to chat
            chatHistory.push({ role: 'user', content: message });
            renderChatHistory();
            userInput.value = '';
            userInput.rows = 1;
            userInput.blur();

            // Show typing indicator
            typingIndicator.classList.remove('hidden');
            stopButton.classList.remove('hidden');

            // Add empty assistant message as placeholder
            const assistantMessageIndex = chatHistory.length;
            chatHistory.push({ role: 'assistant', content: '', model: selectedModel });
            renderChatHistory();

            // Create abort controller for cancellation
            const controller = new AbortController();
            currentController = controller;

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.origin,
                        'X-Title': 'GitHub Page AI Chat'
                    },
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            ...chatHistory.slice(0, -1).map(msg => ({ role: msg.role, content: msg.content }))
                        ],
                        stream: true
                    }),
                    signal: controller.signal
                });

                if (!response.ok) throw new Error(`API error: ${response.status}`);
                if (!response.body) throw new Error('No response body');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let result = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const data = line.substring(5).trim();
                            if (data === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(data);
                                const content = parsed.choices[0]?.delta?.content;
                                if (content) {
                                    result += content;
                                    chatHistory[assistantMessageIndex].content = result;
                                    renderChatHistory();
                                }
                            } catch (e) {
                                console.error('Error parsing SSE:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.error('Error:', error);
                    chatHistory[assistantMessageIndex].content = `⚠️ Error: ${error.message}`;
                    renderChatHistory();
                }
            } finally {
                typingIndicator.classList.add('hidden');
                stopButton.classList.add('hidden');
                currentController = null;
                localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
            }
        }

        // Event Listeners
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-grow textarea
        userInput.addEventListener('input', () => {
            userInput.rows = 1;
            const scrollHeight = userInput.scrollHeight;
            const rows = Math.min(Math.floor((scrollHeight - 34) / 20) + 1, 4);
            userInput.rows = rows;
        });

        // Auto-focus input on page load
        window.addEventListener('load', () => {
            userInput.focus();
        });

        // Theme toggle
        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                themeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                `;
            } else {
                document.documentElement.classList.remove('dark');
                themeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                `;
            }
            localStorage.setItem('darkMode', isDarkMode);
        });

        // Settings modal
        settingsToggle.addEventListener('click', () => {
            settingsModal.classList.remove('hidden');
            settingsModal.setAttribute('aria-hidden', 'false');
            modelSearch.value = '';
            renderModelList(availableModels);
        });

        closeSettings.addEventListener('click', () => {
            settingsModal.classList.add('hidden');
            settingsModal.setAttribute('aria-hidden', 'true');
        });

        // Save API key with validation
        apiKeyInput.addEventListener('change', () => {
            const key = apiKeyInput.value.trim();
            if (key.startsWith('sk-') && key.length > 10) {
                apiKey = key;
                localStorage.setItem('apiKey', apiKey);
                apiKeyError.classList.add('hidden');
            } else {
                apiKeyError.textContent = 'API key should start with "sk-" and be at least 10 characters long';
                apiKeyError.classList.remove('hidden');
            }
        });

        // Save system prompt
        systemPromptInput.addEventListener('change', () => {
            systemPrompt = systemPromptInput.value;
            localStorage.setItem('systemPrompt', systemPrompt);
        });

        // System prompt templates
        promptTemplateHelpful.addEventListener('click', () => {
            systemPromptInput.value = 'You are a helpful, knowledgeable, and friendly assistant. Always respond with clear, concise, and accurate information.';
            systemPrompt = systemPromptInput.value;
            localStorage.setItem('systemPrompt', systemPrompt);
        });

        promptTemplateCreative.addEventListener('click', () => {
            systemPromptInput.value = 'You are a creative and imaginative assistant. Feel free to think outside the box and provide unique, engaging responses.';
            systemPrompt = systemPromptInput.value;
            localStorage.setItem('systemPrompt', systemPrompt);
        });

        promptTemplateConcise.addEventListener('click', () => {
            systemPromptInput.value = 'You are a concise assistant. Provide short, direct answers without unnecessary detail.';
            systemPrompt = systemPromptInput.value;
            localStorage.setItem('systemPrompt', systemPrompt);
        });

        // Refresh models
        refreshModelsButton.addEventListener('click', fetchFreeModels);

        // Clear history
        clearHistoryButton.addEventListener('click', () => {
            if (confirm('Are you sure you want to clear your chat history?')) {
                chatHistory = [];
                localStorage.removeItem('chatHistory');
                renderChatHistory();
            }
        });

        // Model selector change
        modelSelector.addEventListener('change', () => {
            selectedModel = modelSelector.value;
            localStorage.setItem('selectedModel', selectedModel);
        });

        // Stop generation
        stopButton.addEventListener('click', () => {
            if (currentController) {
                currentController.abort();
                typingIndicator.classList.add('hidden');
                stopButton.classList.add('hidden');
            }
        });

        // Initialize
        fetchFreeModels();
        renderChatHistory();
    </script>
</body>
</html>
